<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KCC Kounsar Construction Company</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f7fa;
color:#222;
}

header{
background:#0d3b66;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
position:fixed;
width:100%;
top:0;
z-index:999;
}

.logo{
color:#FFD700;
font-size:30px;
font-weight:700;
}

nav a{
color:white;
text-decoration:none;
margin-left:25px;
font-weight:500;
transition:.3s;
}

nav a:hover{
color:#FFD700;
}

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
url('https://images.unsplash.com/photo-1504307651254-35680f356dfd?auto=format&fit=crop&w=1600&q=80');
background-size:cover;
background-position:center;
color:white;
padding:20px;
}

.hero h1{
font-size:60px;
margin-bottom:20px;
}

.hero p{
font-size:22px;
margin-bottom:35px;
}

.btn{
display:inline-block;
padding:15px 35px;
background:#FFD700;
color:#0d3b66;
text-decoration:none;
font-weight:bold;
border-radius:6px;
margin:10px;
transition:.3s;
}

.btn:hover{
background:white;
}

section{
padding:80px 10%;
}

.title{
text-align:center;
font-size:40px;
color:#0d3b66;
margin-bottom:40px;
}.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
text-align:center;
}

footer{
background:#0d3b66;
color:white;
text-align:center;
padding:30px;
}

</style>
</head>

<body>

<header>
<div class="logo">KCC Construction</div>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Services</a>
<a href="#">Projects</a>
<a href="#">Contact</a>
</nav>
</header>

<section class="hero">
<div>
<h1>KCC Kounsar Construction Company</h1>
<p>Building Today • Shaping Tomorrow</p>

<a href="#" class="btn">Get a Quote</a>
<a href="#" class="btn">Our Services</a>
</div>
</section>

<footer>
<p>© 2026 KCC Kounsar Construction Company. All Rights Reserved.</p>
</footer>

</body>
</html>
